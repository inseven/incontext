name: build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  generate-version-number:
    runs-on: ubuntu-latest

    outputs:
      version_number: ${{ steps.version.outputs.version_number }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Checkout required submodules
      run: |
        git submodule update --init --depth 1 scripts/build-tools
        git submodule update --init --depth 1 scripts/changes

    - name: Install the tool dependencies
      uses: jdx/mise-action@v4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: scripts/install-dependencies.sh

    - name: Generate version and build numbers
      id: version
      run: |
        source scripts/environment.sh
        VERSION_NUMBER=`changes version`
        BUILD_NUMBER=`build-tools generate-build-number`
        echo "version_number=$VERSION_NUMBER" >> $GITHUB_OUTPUT
        echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

  macos-build:

    runs-on: inseven-macos-26

    needs:
    - generate-version-number

    env:
      VERSION_NUMBER: ${{ needs.generate-version-number.outputs.version_number }}
      BUILD_NUMBER: ${{ needs.generate-version-number.outputs.build_number }}

    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.ACCESS_TOKEN }}
        submodules: recursive
        fetch-depth: 0
        lfs: true

    - name: Install dependencies
      run: scripts/install-dependencies.sh

    - name: Build, test, and release
      env:
        DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.PERSONAL_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
        DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.PERSONAL_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}

        APPLE_API_KEY_BASE64: ${{ secrets.PERSONAL_APPLE_API_KEY_BASE64 }}
        APPLE_API_KEY_ID: ${{ secrets.PERSONAL_APPLE_API_KEY_ID }}
        APPLE_API_KEY_ISSUER_ID: ${{ secrets.PERSONAL_APPLE_API_KEY_ISSUER_ID }}

        SPARKLE_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}

        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      run: |
        scripts/build.sh

    - name: Archive the build directory
      uses: actions/upload-artifact@v7
      with:
        name: incontext-macos
        path: build
        if-no-files-found: error

  linux-build:
    strategy:
      matrix:
        include:

        - name: ubuntu-resolute-amd64
          os: ubuntu-26.04
          # container: ubuntu:resolute
          setup: |
            apt-get update -y
            apt-get install -y build-essential git git-lfs swiftlang

        - name: ubuntu-resolute-arm64
          os: ubuntu-26.04-arm
          # container: ubuntu:resolute
          setup: |
            apt-get update -y
            apt-get install -y build-essential git git-lfs swiftlang

    name: ${{ matrix.name }}-build
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}

    needs:
    - generate-version-number

    env:
      VERSION_NUMBER: ${{ needs.generate-version-number.outputs.version_number }}
      BUILD_NUMBER: ${{ needs.generate-version-number.outputs.build_number }}

    steps:

    - name: Setup container
      if: ${{ matrix.setup != '' }}
      run: ${{ matrix.setup }}

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: true

    - name: Cache Swift build directory
      uses: actions/cache@v4
      with:
        path: .build
        key: swift-build-${{ matrix.name }}-${{ hashFiles('Package.resolved') }}
        restore-keys: |
          swift-build-${{ matrix.name }}-

    - name: Install dependencies
      run: scripts/install-linux-dependencies.sh

    - name: Build, test, and package
      run: |
        scripts/build-linux.sh

    - name: Archive the package
      uses: actions/upload-artifact@v7
      with:
        name: incontext-${{ matrix.name }}
        path: build/artifacts/*
        if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest

    needs:
    - generate-version-number
    - macos-build
    - linux-build

    outputs:
      released: ${{ steps.publish.outputs.released }}

    env:
      VERSION_NUMBER: ${{ needs.generate-version-number.outputs.version_number }}
      BUILD_NUMBER: ${{ needs.generate-version-number.outputs.build_number }}

    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.ACCESS_TOKEN }}
        fetch-depth: 0

    - name: Checkout required submodules
      run: |
        git submodule update --init --depth 1 scripts/build-tools
        git submodule update --init --depth 1 scripts/changes

    - name: Install the tool dependencies
      uses: jdx/mise-action@v4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: scripts/install-dependencies.sh

    - uses: actions/download-artifact@v8
      with:
        pattern: "incontext-*"
        path: artifacts

    - name: Publish release
      id: publish
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE: ${{ github.ref == 'refs/heads/main' }}

      run: scripts/release.sh

    - name: Archive the binaries
      uses: actions/upload-artifact@v7
      with:
        name: build
        path: build/*
        if-no-files-found: error

  website-build:
    needs: macos-build
    runs-on: macos-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.ACCESS_TOKEN }}
        submodules: recursive
        fetch-depth: 0
        lfs: true

    - name: Download the build artifacts
      uses: actions/download-artifact@v8
      with:
        name: incontext-macos
        path: build

    - name: Install the tool dependencies
      uses: jdx/mise-action@v4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: scripts/install-dependencies.sh

    - name: Update release notes
      run: scripts/update-release-notes.sh

    - name: Build the site
      run: |
        pushd build
        unzip incontext-*.zip
        popd
        build/incontext build --site docs
        mv docs/build/files _site

    - name: Fix permissions
      run: |
        chmod -v -R +rX "_site/" | while read line; do
          echo "::warning title=Invalid file permissions automatically fixed::$line"
        done

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v5

  website-deploy:
    needs: website-build
    if: ${{ github.ref == 'refs/heads/main' }}

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  macos-update-homebrew:
    needs: publish-release
    if: ${{ needs.publish-release.outputs.released == 'true' }}

    runs-on: ubuntu-latest
    steps:

    - name: Update Homebrew formula
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ secrets._GITHUB_ACCESS_TOKEN }}
        repository: inseven/homebrew-incontext
        event-type: update

  macos-update-sparkle:
    needs: publish-release
    if: ${{ needs.publish-release.outputs.released == 'true' }}

    runs-on: ubuntu-latest
    steps:

    - name: Update Sparkle archives
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ secrets._GITHUB_ACCESS_TOKEN }}
        repository: inseven/sparkle-archives
        event-type: build

  update-releases:
    needs: publish-release
    if: ${{ needs.publish-release.outputs.released == 'true' }}

    runs-on: ubuntu-latest
    steps:

    - name: Update releases repository
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ secrets._GITHUB_ACCESS_TOKEN }}
        repository: inseven/releases
        event-type: build
